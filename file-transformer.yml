# file-transformer.yml
version: 1.0
provider:
  name: openfaas
  gateway: http://127.0.0.1:8080

functions:
  file-transformer:
    lang: python3-http
    handler: ./file-transformer
    image: colasr/file-transformer:latest
    annotations:
      topic: "orders.import" 
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "3"